name: Bug Report
description: Report something that's broken
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Environment
      options:
        - "Mock mode (local dev)"
        - "Production (builtat.growthx.club)"
        - "Both"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Paste screenshots or screen recordings if helpful.
